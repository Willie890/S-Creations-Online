services:
  - type: web
    name: s-creations-api
    runtime: node
    buildCommand: cd server && npm install
    startCommand: cd server && node server.js
    env:
      - key: MONGODB_URI
        value: mongodb+srv://<username>:<password>@cluster0.mongodb.net/s-creations?retryWrites=true&w=majority
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: CLIENT_URL
        value: https://your-netlify-app.netlify.app
      - key: NODE_ENV
        value: production
    healthCheckPath: /api/health
    scaling:
      minInstances: 1
      maxInstances: 3
